<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Animation - 360 Spin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: serif;
        }

        /* TEXTO MAIÚSCULO, SUBLINHADO E DISCRETO */
        h1 {
            color: #fff;
            font-size: 1.5rem;
            text-transform: uppercase;
            text-decoration: underline;
            text-underline-offset: 8px;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 4px;
            opacity: 0.9;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
        }

        /* QUADRADOS */
        .cube {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            bottom: -120px; /* Começa fora da tela, embaixo */
            animation: riseAndSpin linear infinite;
        }

        /* ANIMAÇÃO: SOBE E GIRA 360 GRAUS */
        @keyframes riseAndSpin {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                /* Sobe 120% da altura da tela e completa o giro de 360° */
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* DISTRIBUIÇÃO ALEATÓRIA */
        .cube:nth-child(1) { left: 5%; width: 30px; height: 30px; animation-duration: 8s; }
        .cube:nth-child(2) { left: 15%; width: 20px; height: 20px; animation-duration: 12s; animation-delay: 2s; }
        .cube:nth-child(3) { left: 25%; width: 40px; height: 40px; animation-duration: 10s; animation-delay: 4s; }
        .cube:nth-child(4) { left: 35%; width: 25px; height: 25px; animation-duration: 7s; animation-delay: 1s; }
        .cube:nth-child(5) { left: 45%; width: 35px; height: 35px; animation-duration: 15s; animation-delay: 5s; }
        .cube:nth-child(6) { left: 55%; width: 15px; height: 15px; animation-duration: 9s; animation-delay: 3s; }
        .cube:nth-child(7) { left: 65%; width: 45px; height: 45px; animation-duration: 11s; animation-delay: 0.5s; }
        .cube:nth-child(8) { left: 75%; width: 25px; height: 25px; animation-duration: 13s; animation-delay: 6s; }
        .cube:nth-child(9) { left: 85%; width: 30px; height: 30px; animation-duration: 8s; animation-delay: 2.5s; }
        .cube:nth-child(10) { left: 95%; width: 20px; height: 20px; animation-duration: 14s; animation-delay: 1s; }
        .cube:nth-child(11) { left: 10%; width: 35px; height: 35px; animation-duration: 10s; animation-delay: 7s; }
        .cube:nth-child(12) { left: 30%; width: 15px; height: 15px; animation-duration: 6s; animation-delay: 3s; }
        .cube:nth-child(13) { left: 50%; width: 40px; height: 40px; animation-duration: 12s; animation-delay: 8s; }
        .cube:nth-child(14) { left: 70%; width: 20px; height: 20px; animation-duration: 9s; animation-delay: 4s; }
        .cube:nth-child(15) { left: 90%; width: 30px; height: 30px; animation-duration: 11s; animation-delay: 2s; }
    </style>
</head>
<body>

    <h1>background animation</h1>

    <div class="container">
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
    </div>

</body>
</html>
